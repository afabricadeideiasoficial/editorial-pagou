# Sistema Editorial pagou.ai — Netlify config

[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"

# Cache headers
[[headers]]
  for = "/main.css"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/app.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"
